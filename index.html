<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽天モバイル 日報作成ツール（自動読込版）</title>
    <style>
        :root {
            --rakuten-pink: #bf0000;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--rakuten-pink);
            text-align: center;
            margin-top: 0;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 4px solid var(--rakuten-pink);
            padding-left: 8px;
            margin: 20px 0 10px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .output-area {
            margin-top: 25px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--rakuten-pink);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn:active {
            background-color: #990000;
        }
        .btn-parse {
            background-color: #333;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>日報作成アシスタント</h1>
    
    <div class="form-group">
        <label style="color: var(--rakuten-pink); font-weight: bold;">【1】前日の報告テキストをここに貼り付け</label>
        <textarea id="pastReport" placeholder="前日の日報テキストを丸ごとここにペーストしてください"></textarea>
        <button class="btn btn-parse" onclick="parsePastReport()">前日の実績を読み込む</button>
    </div>

    <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">

    <div class="form-group">
        <label>【2】報告日付</label>
        <input type="date" id="reportDate">
    </div>

    <div class="section-title">▼集客（本日分のみ入力）</div>
    <div class="grid-3">
        <div class="form-group"><label>本日来客数</label><input type="number" id="visitorCount" value="0"></div>
        <div class="form-group"><label>来客組数</label><input type="number" id="visitorPairs" value="0"></div>
        <div class="form-group"><label>内既存人数</label><input type="number" id="existingCount" value="0"></div>
    </div>

    <div class="section-title">▼SIM</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="simTar" value="187"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="simPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="simToday" value="0"></div>
    </div>

    <div class="section-title">▼オプション：ひかり</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="hikariTar" value="8"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="hikariPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="hikariToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="hikariTalk">
            <option value="">-- 選択してください --</option>
            <option value="電力会社のwifi使用中との事で楽天経済圏にまとめた方がお得になりますよ！">経済圏まとめ：電力会社WiFiから経済圏まとめ提案</option>
            <option value="今のスマホ料金と合わせても、他社単体よりお安くなるシミュレーションをお見せしました。">料金比較：スマホ合算での安さ訴求</option>
        </select>
    </div>

    <div class="section-title">▼オプション：Turbo</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="turboTar" value="5"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="turboPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="turboToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="turboTalk">
            <option value="">-- 選択してください --</option>
            <option value="コンセントに挿すだけですぐにWi-Fiが使えるので、工事を待てない方にぴったりです。">手軽さ：工事不要・即日利用のメリット訴求</option>
            <option value="お引っ越し直後で即日使いたいとのことで、手軽さに魅力を感じていただけました。">手軽さ：引っ越し時の手続き不要をアピール</option>
        </select>
    </div>

    <div class="section-title">▼オプション：カード</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="cardTar" value="37"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="cardPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="cardToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="cardTalk">
            <option value="">-- 選択してください --</option>
            <option value="楽天モバイルの月額料金をこのカードで支払うだけで、ポイントがさらに貯まりやすくなりますよ！">ポイント還元：スマホ決済との相性の良さをアピール</option>
            <option value="新規入会キャンペーンのポイントで、実質数ヶ月分のスマホ代が浮く計算になります！">おトク感：入会特典ポイントのメリット訴求</option>
        </select>
    </div>

    <div class="section-title">▼オプション：かけ放題</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="kakeTar" value="100"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="kakePrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="kakeToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="kakeTalk">
            <option value="">-- 選択してください --</option>
            <option value="LINKの音質が不安定なときがあります。標準通話ならビジネスや大事な電話も途切れません。">音質不安解消：標準通話の安定性訴求</option>
            <option value="Linkでのかけ忘れや通話時間超過の心配がない15分かけ放題が安心でおすすめです。">安心感：かけ忘れ防止</option>
        </select>
    </div>

    <div class="section-title">▼オプション：最強保護</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="hogoTar" value="63"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="hogoPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="hogoToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="hogoTalk">
            <option value="">-- 選択してください --</option>
            <option value="過去の個人情報漏洩についてもお調べが可能ですよ。">セキュリティ：個人情報漏洩チェック訴求</option>
            <option value="新しいスマホのウイルス対策や危険サイトブロックがこれ一つで24時間守れます。">端末保護：新端末への安心セキュリティ訴求</option>
        </select>
    </div>

    <button class="btn" onclick="generateReport()">【3】本日分の日報テキストを生成</button>

    <div class="output-area">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <strong>【生成された最新日報】</strong>
            <button onclick="copyToClipboard()" style="padding: 4px 8px; font-size: 0.8rem; cursor: pointer;">コピー</button>
        </div>
        <pre id="outputText">「本日分の日報テキストを生成」を押すとここに表示されます</pre>
    </div>
</div>

<script>
    const today = new Date();
    document.getElementById('reportDate').value = today.toISOString().split('T')[0];

    function parsePastReport() {
        const text = document.getElementById('pastReport').value;
        if (!text) {
            alert('前日の日報テキストを入力してください。');
            return;
        }

        const simMatch = text.match(/▼SIM[\s\S]*?月間実績：\s*(\d+)件/);
        const hikariMatch = text.match(/ひかり[\s\S]*?月間実績：\s*(\d+)件/);
        const turboMatch = text.match(/Turbo[\s\S]*?月間実績：\s*(\d+)件/);
        const cardMatch = text.match(/カード[\s\S]*?月間実績：\s*(\d+)件/);
        const kakeMatch = text.match(/かけ放題[\s\S]*?月間実績：\s*(\d+)件/);
        const hogoMatch = text.match(/最強保護[\s\S]*?月間実績：\s*(\d+)件/);

        document.getElementById('simPrev').value = simMatch ? simMatch[1] : 0;
        document.getElementById('hikariPrev').value = hikariMatch ? hikariMatch[1] : 0;
        document.getElementById('turboPrev').value = turboMatch ? turboMatch[1] : 0;
        document.getElementById('cardPrev').value = cardMatch ? cardMatch[1] : 0;
        document.getElementById('kakePrev').value = kakeMatch ? kakeMatch[1] : 0;
        document.getElementById('hogoPrev').value = hogoMatch ? hogoMatch[1] : 0;

        alert('前日の実績数値を読み込みました！続けて本日実績を入力してください。');
    }

    function generateReport() {
        const dateInput = new Date(document.getElementById('reportDate').value);
        const dateStr = `${dateInput.getMonth() + 1}月${dateInput.getDate()}日`;

        const getSum = (prevId, todayId) => {
            return (Number(document.getElementById(prevId).value) || 0) + (Number(document.getElementById(todayId).value) || 0);
        };

        const reportText = `【実績報告】${dateStr}

▼集客
本日来客数：${document.getElementById('visitorCount').value}人（${document.getElementById('visitorPairs').value}組）
∟内既存：${document.getElementById('existingCount').value}人

▼SIM
月間目標：${document.getElementById('simTar').value}件
月間実績：${getSum('simPrev', 'simToday')}件
本日実績：${document.getElementById('simToday').value}件

▼オプション
ひかり
・月間目標： ${document.getElementById('hikariTar').value}件
・月間実績： ${getSum('hikariPrev', 'hikariToday')}件
・本日実績： ${document.getElementById('hikariToday').value}件
（本日獲得のトーク・事例）
・${document.getElementById('hikariTalk').value || ''}

Turbo
・月間目標： ${document.getElementById('turboTar').value}件
・月間実績： ${getSum('turboPrev', 'turboToday')}件
・本日実績： ${document.getElementById('turboToday').value}件
（本日獲得のトーク・事例）
・${document.getElementById('turboTalk').value || ''}

カード
・月間目標： ${document.getElementById('cardTar').value}件
・月間実績： ${getSum('cardPrev', 'cardToday')}件
・本日実績： ${document.getElementById('cardToday').value}件
（本日獲得のトーク・事例）
・${document.getElementById('cardTalk').value || ''}

かけ放題
・月間目標： ${document.getElementById('kakeTar').value}件
・月間実績： ${getSum('kakePrev', 'kakeToday')}件
・本日実績： ${document.getElementById('kakeToday').value}件
（本日獲得のトーク・事例）
・${document.getElementById('kakeTalk').value || ''}

最強保護
・月間目標： ${document.getElementById('hogoTar').value}件
・月間実績： ${getSum('hogoPrev', 'hogoToday')}件
・本日実績： ${document.getElementById('hogoToday').value}件
（本日獲得のトーク・事例）
・${document.getElementById('hogoTalk').value || ''}`;

        document.getElementById('outputText').innerText = reportText;
    }

    function copyToClipboard() {
        const text = document.getElementById('outputText').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('最新の日報をクリップボードにコピーしました！');
        }).catch(err => {
            alert('コピーに失敗しました。枠内のテキストを長押ししてコピーしてください。');
        });
    }
</script>

</body>
</html>
