<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽天モバイル 日報作成ツール</title>
    <style>
        :root {
            --rakuten-pink: #bf0000;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--rakuten-pink);
            text-align: center;
            margin-top: 0;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 4px solid var(--rakuten-pink);
            padding-left: 8px;
            margin: 20px 0 10px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input[type="number"], input[type="date"], input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .output-area {
            margin-top: 25px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--rakuten-pink);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:active {
            background-color: #990000;
        }
        .btn-parse {
            background-color: #333;
            margin-bottom: 15px;
        }
        .custom-input-area {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background-color: #fff9fb;
            border: 1px solid #ffc0cb;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>日報作成アシスタント</h1>
    
    <div class="form-group">
        <label style="color: var(--rakuten-pink); font-weight: bold;">【1】前日の報告テキストをここに貼り付け</label>
        <textarea id="pastReport" placeholder="前日の日報テキストを丸ごとここにペーストしてください"></textarea>
        <button class="btn btn-parse" onclick="parsePastReport()">前日の実績を読み込む</button>
    </div>

    <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">

    <div class="form-group">
        <label>【2】報告日付</label>
        <input type="date" id="reportDate">
    </div>

    <div class="section-title">▼集客（本日分のみ入力）</div>
    <div class="grid-3">
        <div class="form-group"><label>本日来客数</label><input type="number" id="visitorCount" value="0"></div>
        <div class="form-group"><label>来客組数</label><input type="number" id="visitorPairs" value="0"></div>
        <div class="form-group"><label>内既存人数</label><input type="number" id="existingCount" value="0"></div>
    </div>

    <div class="section-title">▼SIM</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="simTar" value="187"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="simPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="simToday" value="0"></div>
    </div>

    <div class="section-title">▼オプション：ひかり</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="hikariTar" value="8"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="hikariPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="hikariToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="hikariTalk" onchange="toggleCustom('hikari')">
            <option value="">-- 選択してください --</option>
            <option value="工事費のポイント還元と毎月のポイント還元をフックに獲得。">工事費・毎月のポイント還元訴求</option>
            <option value="モバイル、カード、ひかりでSPU9倍、楽天市場で1万円分お買い物すると900ポイントも付与されるので、楽天でまとめるメリットを話して獲得。">SPU9倍・楽天市場まとめメリット訴求</option>
            <option value="オンラインゲームやリモート会議のラグが少ないので、テザリングよりひかりがおすすめと話して獲得。">品質重視（ゲーム・リモート会議）訴求</option>
            <option value="FREE">その他（自由入力）</option>
        </select>
        <div id="hikariFreeArea" class="custom-input-area">
            <label>自由入力欄（ひかり）</label>
            <input type="text" id="hikariFreeText" placeholder="獲得事例を自由に入力してください">
        </div>
    </div>

    <div class="section-title">▼オプション：Turbo</div>
    <div class="grid-3">
        <div class="form-group"><label>月間目標</label><input type="number" id="turboTar" value="5"></div>
        <div class="form-group"><label>前日迄累計</label><input type="number" id="turboPrev" value="0" readonly style="background: #e9ecef;"></div>
        <div class="form-group"><label>本日実績</label><input type="number" id="turboToday" value="0"></div>
    </div>
    <div class="form-group">
        <label>獲得トーク・事例</label>
        <select id="turboTalk" onchange="toggleCustom('turbo')">
            <option value="">-- 選択してください --</option>
            <option value="引っ越しが多いと伺ったので、ひかりよりTurboの方が引っ越しの手続きが手軽。">引っ越し手続きの手軽さ訴求</option>
            <option value="工事不要ですぐ利用できる。">工事不要・即日利用訴求</option>
            <option value="配線のごちゃつきを気にされていたので、ひかりと違ってTurboは配線が1本なので線がごちゃつくことがなく、部屋がすっきりするのでおすすめと話して獲得。">配線すっきり・部屋の美観訴求</option>
            <option value="モバイル、カード、ターボで
